{% extends "admin/base.html" %}
{% block title %}Profile — {{ group.name }}{% endblock %}
{% block sidebar %}
<a href="/admin/org/?group_id={{ group.id }}" class="block px-3 py-2 rounded text-sm text-slate-300 hover:bg-slate-700 hover:text-white">Dashboard</a>
<a href="/admin/org/users?group_id={{ group.id }}" class="block px-3 py-2 rounded text-sm text-slate-300 hover:bg-slate-700 hover:text-white">Users</a>
<a href="/admin/org/claims?group_id={{ group.id }}" class="block px-3 py-2 rounded text-sm text-slate-300 hover:bg-slate-700 hover:text-white">Claims</a>
<a href="/admin/org/profile?group_id={{ group.id }}" class="block px-3 py-2 rounded text-sm bg-green-700 text-white">Profile</a>
{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-gray-900 mb-6">Organization Profile</h1>

{% if saved %}
<div class="mb-6 p-4 bg-green-50 border border-green-200 rounded-lg">
  <p class="text-sm font-medium text-green-800">Saved successfully.</p>
</div>
{% endif %}

<div class="bg-white shadow rounded-lg">
  <div class="px-6 py-4 border-b border-gray-200">
    <h2 class="text-base font-semibold text-gray-900">Edit Organization</h2>
  </div>
  <form method="POST" action="/admin/org/profile" class="px-6 py-4 space-y-4">
    <input type="hidden" name="group_id" value="{{ group.id }}" />
    <div>
      <label class="block text-sm font-medium text-gray-700">Organization Name</label>
      <input type="text" name="name" value="{{ group.name }}" required
             class="mt-1 block w-full border border-gray-300 rounded px-3 py-2 text-sm" />
    </div>
    <div>
      <button type="submit" class="bg-green-700 text-white px-4 py-2 rounded text-sm hover:bg-green-600">Save Changes</button>
    </div>
  </form>
</div>
{% endblock %}
