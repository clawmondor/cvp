{% extends "base.html" %}
{% block title %}Profile — {{ group.name }}{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-neutral-900 mb-6">Organization Profile</h1>

{% if saved %}
<div class="mb-6 p-4 bg-success-surface border border-success-border rounded-lg">
  <p class="text-sm font-medium text-success-strong">Saved successfully.</p>
</div>
{% endif %}

<div class="card">
  <div class="px-6 py-4 border-b border-neutral-200">
    <h2 class="text-base font-semibold text-neutral-900">Edit Organization</h2>
  </div>
  <form method="POST" action="/admin/org/profile" class="px-6 py-4 space-y-4">
    <input type="hidden" name="group_id" value="{{ group.id }}" />
    <div>
      <label class="block text-sm font-medium text-neutral-700">Organization Name</label>
      <input type="text" name="name" value="{{ group.name }}" required
             class="mt-1 block w-full border border-neutral-300 rounded-sm px-3 py-2 text-sm" />
    </div>
    <div>
      <button type="submit" class="bg-success text-white px-4 py-2 rounded-sm text-sm hover:bg-success-emphasis">Save Changes</button>
    </div>
  </form>
</div>
{% endblock %}
