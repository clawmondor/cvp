{% extends "base.html" %}
{% block title %}Claims{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-neutral-900 mb-6">Claims</h1>
<div class="card">
  <table class="min-w-full divide-y divide-neutral-200">
    <thead class="bg-neutral-50">
      <tr>
        <th class="px-6 py-3 text-left text-xs font-medium text-neutral-500 uppercase">Claim</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-neutral-500 uppercase">Status</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-neutral-500 uppercase">Delivery Date</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-neutral-500 uppercase">Access</th>
      </tr>
    </thead>
    <tbody class="bg-surface divide-y divide-neutral-200">
      {% for m in claims %}
      <tr>
        <td class="px-6 py-4 text-sm"><a href="/claims/{{ m.id }}" class="text-primary-strong hover:underline">{{ m.insured_name }}</a></td>
        <td class="px-6 py-4 text-sm text-neutral-500">{{ m.status }}</td>
        <td class="px-6 py-4 text-sm text-neutral-500">{{ m.target_delivery_date or "—" }}</td>
        <td class="px-6 py-4 text-sm"><a href="/admin/internal/claims/{{ m.id }}/access" class="text-primary-strong hover:underline">Manage Access</a></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
