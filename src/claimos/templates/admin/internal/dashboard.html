{% extends "base.html" %}
{% block title %}Internal Dashboard{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-neutral-900 mb-6">Internal Dashboard</h1>
<div class="grid grid-cols-3 gap-6">
  <div class="card p-6">
    <p class="text-sm text-neutral-500">Internal Users</p>
    <p class="text-3xl font-bold text-neutral-900 mt-1">{{ internal_user_count }}</p>
  </div>
  <div class="card p-6">
    <p class="text-sm text-neutral-500">External Groups</p>
    <p class="text-3xl font-bold text-neutral-900 mt-1">{{ external_group_count }}</p>
  </div>
  <div class="card p-6">
    <p class="text-sm text-neutral-500">Claims</p>
    <p class="text-3xl font-bold text-neutral-900 mt-1">{{ claim_count }}</p>
  </div>
</div>
{% endblock %}
