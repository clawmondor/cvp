{% extends "base.html" %}
{% block title %}System Dashboard{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-neutral-900 mb-6">System Dashboard</h1>
<div class="grid grid-cols-3 gap-6">
  <div class="card p-6">
    <p class="text-sm text-neutral-500">Users</p>
    <p class="text-3xl font-bold text-neutral-900 mt-1">{{ user_count }}</p>
  </div>
  <div class="card p-6">
    <p class="text-sm text-neutral-500">Groups</p>
    <p class="text-3xl font-bold text-neutral-900 mt-1">{{ group_count }}</p>
  </div>
  <div class="card p-6">
    <p class="text-sm text-neutral-500">Claims</p>
    <p class="text-3xl font-bold text-neutral-900 mt-1">{{ claim_count }}</p>
  </div>
</div>
<div class="mt-8">
  <a href="/admin/system/runtime-config"
     class="block max-w-sm rounded-lg border border-neutral-200 bg-surface p-4 hover:bg-neutral-50">
    <p class="text-sm font-semibold text-neutral-900">Runtime Config</p>
    <p class="text-xs text-neutral-500">Evidence upload caps and concurrency.</p>
  </a>
</div>
{% endblock %}
