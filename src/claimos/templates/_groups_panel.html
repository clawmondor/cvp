<div class="space-y-4 mt-6">
  <div class="flex items-center justify-between">
    <h3 class="text-sm font-semibold text-neutral-700">Groups ({{ item_groups | length }})</h3>
    <form id="add-item-group-form"
          hx-post="/api/claims/{{ claim.id }}/item-groups"
          hx-target="#item-groups-list"
          hx-swap="beforeend"
          class="flex items-center gap-2">
      <input name="name" placeholder="Group name (e.g. 12, Box A)" required maxlength="100"
             class="rounded-md border border-neutral-300 px-3 py-1.5 text-sm focus:border-primary-light focus:outline-hidden focus:ring-1 focus:ring-primary-light">
      <button type="submit"
              class="rounded-md bg-primary px-3 py-1.5 text-sm font-semibold text-white hover:bg-primary-light">
        Add group
      </button>
    </form>
  </div>

  {% set claim_id = claim.id %}
  <ul id="item-groups-list" class="space-y-2">
    {% for group, item_count in item_groups %}
      {% include "_item_group_li.html" %}
    {% else %}
    <li id="item-groups-empty" class="text-sm text-neutral-400 italic">
      No groups yet — add one above or have a scan auto-detect a placard.
    </li>
    {% endfor %}
  </ul>
</div>
