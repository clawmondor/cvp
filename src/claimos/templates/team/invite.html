{% extends "base.html" %}
{% block title %}Team — Invite Member{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold text-neutral-900">Invite Member</h1>
  <a href="/team/users" class="text-sm text-neutral-500 hover:underline">Back to members</a>
</div>

<div class="card">
  <div class="px-6 py-4 border-b border-neutral-200">
    <h2 class="text-base font-semibold text-neutral-900">New invite</h2>
  </div>
  <form method="POST" action="/team/users/invite" class="px-6 py-4 flex flex-wrap items-end gap-4">
    <div>
      <label class="block text-sm font-medium text-neutral-700" for="invite-email">Email</label>
      <input id="invite-email" type="email" name="email" required class="mt-1 block w-full border border-neutral-300 rounded-sm px-3 py-2 text-sm" />
    </div>
    <div>
      <label class="block text-sm font-medium text-neutral-700" for="invite-display-name">Display Name</label>
      <input id="invite-display-name" type="text" name="display_name" required class="mt-1 block w-full border border-neutral-300 rounded-sm px-3 py-2 text-sm" />
    </div>
    <div>
      <label class="block text-sm font-medium text-neutral-700" for="invite-user-role">User Role</label>
      <select id="invite-user-role" name="user_role" class="mt-1 border border-neutral-300 rounded-sm text-sm px-3 py-2">
        {% for role_key in user_roles %}
        <option value="{{ role_key }}">{{ role_key }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-neutral-700" for="invite-scope">Scope</label>
      <select id="invite-scope" name="scope" data-role="scope-select" class="mt-1 border border-neutral-300 rounded-sm text-sm px-3 py-2">
        <option value="group">Group</option>
        <option value="claims">Specific claims</option>
      </select>
    </div>
    <div data-role="claim-picker" hidden>
      <label class="block text-sm font-medium text-neutral-700" for="invite-claim-ids">Claims</label>
      <select id="invite-claim-ids" name="claim_ids" multiple class="mt-1 border border-neutral-300 rounded-sm text-sm px-3 py-2">
        {% for claim in group_claims %}
        <option value="{{ claim.id }}">{{ claim.claim_number or claim.id }}</option>
        {% endfor %}
      </select>
    </div>
    <button type="submit" class="bg-success text-white px-4 py-2 rounded-sm text-sm hover:bg-success-emphasis">Send Invite</button>
  </form>
</div>
{% endblock %}
