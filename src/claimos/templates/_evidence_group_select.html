{# Per-image group dropdown.
   Expects: f (EvidenceFile), item_groups_flat (list[ItemGroup]), claim_id #}
<form class="mt-1"
      hx-patch="/api/claims/{{ claim_id }}/evidence/{{ f.id }}/item-group"
      hx-trigger="change from:select[name='item_group_id']"
      hx-swap="none">
  <label class="text-xs text-neutral-500">Group</label>
  <select name="item_group_id"
          data-evidence-group-select="{{ f.id }}"
          data-claim-id="{{ claim_id }}"
          class="mt-0.5 block w-full rounded-sm border border-neutral-300 px-1.5 py-0.5 text-xs focus:border-primary-light focus:outline-hidden">
    <option value="" {% if not f.pinned_item_group_id %}selected{% endif %}>Auto-detect</option>
    {% for g in item_groups_flat %}
    <option value="{{ g.id }}" {% if f.pinned_item_group_id == g.id %}selected{% endif %}>{{ g.name }}</option>
    {% endfor %}
    <option value="__new__">+ New group…</option>
  </select>
</form>
