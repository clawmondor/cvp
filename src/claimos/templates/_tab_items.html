<div class="space-y-4">

  {% set claim_id = claim.id %}

  <!-- New-items banner: shown by app.js when a scan/region rescan adds items -->
  <div id="items-new-banner" data-claim-id="{{ claim.id }}"
       class="hidden flex items-center justify-between gap-3 rounded-lg border border-primary-tint-strong bg-primary-subtle px-4 py-2 text-sm text-primary-strong">
    <span><span aria-hidden="true">✦</span> <span data-new-items-label>New items added</span></span>
    <button type="button" data-view-new-items
            class="rounded-md bg-primary px-3 py-1 text-xs font-semibold text-white hover:bg-primary-light">
      View them →
    </button>
  </div>

  <!-- Add item form -->
  <details id="add-item-details" class="rounded-lg border border-neutral-200 bg-surface shadow-xs">
    <summary class="flex cursor-pointer items-center justify-between px-4 py-3 text-sm font-semibold text-neutral-700 hover:bg-neutral-50 select-none">
      <span>+ Add item</span>
    </summary>
    <div class="border-t border-neutral-100 px-4 py-4">
      <form hx-post="/api/claims/{{ claim.id }}/items"
            hx-target="#items-tbody"
            hx-swap="beforeend"
            hx-on::after-request="if(event.detail.successful){ this.reset(); document.getElementById('add-item-details').removeAttribute('open'); }"
            class="space-y-3">
        <div class="grid grid-cols-12 gap-3 items-end">
          <div class="col-span-4">
            <label class="text-xs font-medium text-neutral-600">Description <span class="text-error">*</span></label>
            <input name="description" required maxlength="255" placeholder="e.g. 65″ Samsung QLED TV"
                   class="mt-0.5 block w-full rounded-md border border-neutral-300 px-3 py-1.5 text-sm focus:border-primary-light focus:outline-hidden focus:ring-1 focus:ring-primary-light">
          </div>
          <div class="col-span-2">
            <label class="text-xs font-medium text-neutral-600">Category <span class="text-error">*</span></label>
            <select name="category_id" required
                    class="mt-0.5 block w-full rounded-md border border-neutral-300 px-3 py-1.5 text-sm focus:border-primary-light focus:outline-hidden">
              {% for cat in categories %}
              <option value="{{ cat.id }}">{{ cat.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-span-2">
            <label class="text-xs font-medium text-neutral-600">Room</label>
            <select name="room_id"
                    class="mt-0.5 block w-full rounded-md border border-neutral-300 px-3 py-1.5 text-sm focus:border-primary-light focus:outline-hidden">
              <option value="">— unassigned —</option>
              {% for room in rooms %}
              <option value="{{ room.id }}">{{ room.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-span-1">
            <label class="text-xs font-medium text-neutral-600">Qty</label>
            <input name="quantity" type="number" min="1" value="1"
                   class="mt-0.5 block w-full rounded-md border border-neutral-300 px-3 py-1.5 text-sm focus:border-primary-light focus:outline-hidden">
          </div>
          <div class="col-span-1">
            <label class="text-xs font-medium text-neutral-600">Age (yr)</label>
            <input name="age_years" type="number" min="0" step="0.5" value="0"
                   class="mt-0.5 block w-full rounded-md border border-neutral-300 px-3 py-1.5 text-sm focus:border-primary-light focus:outline-hidden">
          </div>
          <div class="col-span-1">
            <label class="text-xs font-medium text-neutral-600">Condition</label>
            <select name="condition"
                    class="mt-0.5 block w-full rounded-md border border-neutral-300 px-3 py-1.5 text-sm focus:border-primary-light focus:outline-hidden">
              <option value="excellent">Excellent</option>
              <option value="above_average">Above avg</option>
              <option value="average" selected>Average</option>
              <option value="below_average">Below avg</option>
            </select>
          </div>
          <div class="col-span-1">
            <label class="text-xs font-medium text-neutral-600">Retail/unit ($)</label>
            <input name="retail_unit_dollars" type="number" min="0" step="0.01" value="0"
                   class="mt-0.5 block w-full rounded-md border border-neutral-300 px-3 py-1.5 text-sm font-mono focus:border-primary-light focus:outline-hidden">
          </div>
          <div class="col-span-1">
            <label class="text-xs font-medium text-neutral-600">Shipping/line ($)</label>
            <input name="shipping_dollars" type="number" min="0" step="0.01" value="0"
                   class="mt-0.5 block w-full rounded-md border border-neutral-300 px-3 py-1.5 text-sm font-mono focus:border-primary-light focus:outline-hidden">
          </div>
        </div>
        <div class="flex justify-end">
          <button type="submit"
                  class="rounded-md bg-primary px-4 py-1.5 text-sm font-semibold text-white hover:bg-primary-light">
            Add item
          </button>
        </div>
      </form>
    </div>
  </details>

  <!-- Items table -->
  <div class="overflow-x-auto rounded-lg border border-neutral-200 bg-surface shadow-xs">
    <table class="min-w-full divide-y divide-neutral-200">
      <thead class="bg-neutral-50">
        <tr>
          <th class="px-3 py-2 text-left text-xs font-medium text-neutral-500">#</th>
          <th class="px-3 py-2 text-left text-xs font-medium text-neutral-500" style="width:100px;min-width:100px;">Photo</th>
          <th class="px-3 py-2 text-left text-xs font-medium text-neutral-500">Description</th>
          <th class="px-3 py-2 text-left text-xs font-medium text-neutral-500">Room</th>
          <th class="px-3 py-2 text-left text-xs font-medium text-neutral-500">Category</th>
          <th class="px-3 py-2 text-right text-xs font-medium text-neutral-500">Qty</th>
          <th class="px-3 py-2 text-right text-xs font-medium text-neutral-500">Age</th>
          <th class="px-3 py-2 text-left text-xs font-medium text-neutral-500">Cond</th>
          <th class="px-3 py-2 text-right text-xs font-medium text-neutral-500">RCV/unit</th>
          <th class="px-3 py-2 text-right text-xs font-medium text-neutral-500">RCV total</th>
          <th class="px-3 py-2 text-right text-xs font-medium text-neutral-500">ACV total</th>
          <th class="px-3 py-2 text-center text-xs font-medium text-neutral-500">Status</th>
          <th class="px-3 py-2 text-center text-xs font-medium text-neutral-500">Actions</th>
        </tr>
      </thead>
      <tbody id="items-tbody" class="divide-y divide-neutral-100 bg-surface">
        {% include "_items_tbody.html" %}
      </tbody>
    </table>
  </div>

  {% include "_items_summary.html" %}

</div>
