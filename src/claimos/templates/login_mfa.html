<!doctype html>
<html lang="en" class="h-full bg-neutral-50 {{ theme_class(request) }}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Two-Factor Authentication — ClaimOS</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body class="h-full">
  <div class="flex min-h-full flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
      <h2 class="mt-6 text-center text-2xl font-bold tracking-tight text-neutral-900">
        Two-factor authentication
      </h2>
      <p class="mt-2 text-center text-sm text-neutral-600">
        Enter the 6-digit code from your authenticator app
      </p>
    </div>
    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
      <div class="bg-surface py-8 px-4 shadow-sm sm:rounded-lg sm:px-10">
        {% if error %}
        <div class="mb-4 rounded-md bg-error-surface p-4">
          <p class="text-sm text-error-strong">{{ error }}</p>
        </div>
        {% endif %}
        <form method="POST" action="/api/auth/mfa/verify" class="space-y-6">
          <input type="hidden" name="mfa_token" value="{{ mfa_token }}" />
          <input type="hidden" name="next" value="{{ next_url or '' }}" />
          <div>
            <label for="code" class="block text-sm font-medium text-neutral-700">Authentication code</label>
            <input id="code" name="code" type="text" inputmode="numeric" pattern="[0-9]{6}"
                   maxlength="6" required autofocus autocomplete="one-time-code"
                   class="mt-1 block w-full rounded-md border border-neutral-300 px-3 py-2 text-center text-2xl tracking-widest shadow-xs focus:border-primary-light focus:outline-hidden focus:ring-primary-light" />
          </div>
          <div>
            <button type="submit"
                    class="btn-primary flex w-full justify-center rounded-md px-3 py-2 text-sm">
              Verify
            </button>
          </div>
        </form>
        <p class="mt-4 text-center text-xs text-neutral-500">
          Having trouble? Contact your administrator.
        </p>
      </div>
    </div>
  </div>
</body>
</html>
