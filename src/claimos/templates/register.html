<!doctype html>
<html lang="en" class="h-full bg-neutral-50">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create Account — ClaimOS</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body class="h-full">
  <div class="flex min-h-full flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
      <h2 class="mt-6 text-center text-2xl font-bold tracking-tight text-neutral-900">
        Create your account
      </h2>
    </div>
    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
      <div class="bg-surface py-8 px-4 shadow-sm sm:rounded-lg sm:px-10">
        {% if error %}
        <div class="mb-4 rounded-md bg-error-surface p-4">
          <p class="text-sm text-error-strong">{{ error }}</p>
        </div>
        {% endif %}
        {% if invalid %}
        <div class="text-center">
          <p class="text-sm text-neutral-600">This invite link is no longer valid.</p>
          <p class="mt-2 text-sm text-neutral-500">Contact your administrator for a new invite.</p>
        </div>
        {% else %}
        <form method="POST" action="/api/auth/register" class="space-y-6">
          <input type="hidden" name="invite_code" value="{{ invite_code }}" />
          <div>
            <label class="block text-sm font-medium text-neutral-700">Email</label>
            <p class="mt-1 text-sm text-neutral-900">{{ email }}</p>
          </div>
          <div>
            <label for="display_name" class="block text-sm font-medium text-neutral-700">Display name</label>
            <input id="display_name" name="display_name" type="text" required
                   class="mt-1 block w-full rounded-md border border-neutral-300 px-3 py-2 shadow-xs focus:border-primary-light focus:outline-hidden focus:ring-primary-light sm:text-sm" />
          </div>
          <div>
            <label for="password" class="block text-sm font-medium text-neutral-700">Password</label>
            <input id="password" name="password" type="password" required minlength="12"
                   class="mt-1 block w-full rounded-md border border-neutral-300 px-3 py-2 shadow-xs focus:border-primary-light focus:outline-hidden focus:ring-primary-light sm:text-sm" />
            <p class="mt-1 text-xs text-neutral-500">Minimum 12 characters</p>
          </div>
          <div>
            <label for="password_confirm" class="block text-sm font-medium text-neutral-700">Confirm password</label>
            <input id="password_confirm" name="password_confirm" type="password" required minlength="12"
                   class="mt-1 block w-full rounded-md border border-neutral-300 px-3 py-2 shadow-xs focus:border-primary-light focus:outline-hidden focus:ring-primary-light sm:text-sm" />
          </div>
          <div>
            <button type="submit"
                    class="btn-primary flex w-full justify-center rounded-md px-3 py-2 text-sm">
              Create Account
            </button>
          </div>
        </form>
        {% endif %}
      </div>
    </div>
  </div>
</body>
</html>
