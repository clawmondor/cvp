<!doctype html>
<html lang="en" class="h-full bg-neutral-50">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign In — ClaimOS</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body class="h-full">
  <div class="flex min-h-full flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
      <h2 class="mt-6 text-center text-2xl font-bold tracking-tight text-neutral-900">
        Sign in to your account
      </h2>
    </div>
    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
      <div class="bg-surface py-8 px-4 shadow-sm sm:rounded-lg sm:px-10">
        {% if error %}
        <div class="mb-4 rounded-md bg-error-surface p-4">
          <p class="text-sm text-error-strong">{{ error }}</p>
        </div>
        {% endif %}
        {% if message %}
        <div class="mb-4 rounded-md bg-success-surface p-4">
          <p class="text-sm text-success">{{ message }}</p>
        </div>
        {% endif %}
        <form method="POST" action="/api/auth/login" class="space-y-6">
          <input type="hidden" name="next" value="{{ next_url or '' }}" />
          <div>
            <label for="email" class="block text-sm font-medium text-neutral-700">Email address</label>
            <input id="email" name="email" type="email" autocomplete="email" required
                   class="mt-1 block w-full rounded-md border border-neutral-300 px-3 py-2 shadow-xs focus:border-primary-light focus:outline-hidden focus:ring-primary-light sm:text-sm" />
          </div>
          <div>
            <label for="password" class="block text-sm font-medium text-neutral-700">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required
                   class="mt-1 block w-full rounded-md border border-neutral-300 px-3 py-2 shadow-xs focus:border-primary-light focus:outline-hidden focus:ring-primary-light sm:text-sm" />
          </div>
          <div>
            <button type="submit"
                    class="btn-primary flex w-full justify-center rounded-md px-3 py-2 text-sm focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary">
              Sign in
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
