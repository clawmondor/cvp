<li id="item-group-{{ group.id }}"
    class="group flex items-center justify-between rounded-md border border-neutral-200 bg-surface px-4 py-2.5 shadow-xs">
  <div class="flex items-center gap-3">
    <span id="item-group-name-{{ group.id }}" class="text-sm font-medium text-neutral-900">{{ group.name }}</span>
    <span class="text-xs text-neutral-400">{{ item_count }} item{{ "" if item_count == 1 else "s" }}</span>
  </div>
  <div class="flex items-center gap-2">
    <button
      data-rename-item-group-id="{{ group.id }}"
      data-rename-item-group-claim="{{ claim_id }}"
      class="hidden rounded-sm px-2 py-0.5 text-xs text-neutral-500 hover:bg-neutral-100 group-hover:inline-flex">
      Rename
    </button>
    <button
      hx-delete="/api/claims/{{ claim_id }}/item-groups/{{ group.id }}"
      hx-target="#item-group-{{ group.id }}"
      hx-swap="outerHTML"
      hx-confirm="Delete group '{{ group.name }}'? Items in this group will become ungrouped."
      class="hidden rounded-sm px-2 py-0.5 text-xs text-error hover:bg-error-surface group-hover:inline-flex">
      Delete
    </button>
  </div>
</li>
