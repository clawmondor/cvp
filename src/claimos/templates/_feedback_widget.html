<div data-feedback-widget class="fixed bottom-4 right-4 z-50">
  <button type="button"
          data-feedback-toggle
          aria-label="Feedback"
          class="relative inline-flex h-12 w-12 items-center justify-center rounded-full bg-primary text-white shadow-lg hover:bg-primary-light">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M7 8h10M7 12h6m4 8l-4-4H6a2 2 0 01-2-2V6a2 2 0 012-2h12a2 2 0 012 2v8a2 2 0 01-2 2h-1l-2 4z" />
    </svg>
    <span hx-get="/feedback/unread"
          hx-trigger="load, every 60s"
          hx-swap="outerHTML"></span>
  </button>

  <div data-feedback-popover
       class="hidden absolute bottom-14 right-0 w-96 max-h-[480px] overflow-y-auto rounded-lg bg-surface p-4 shadow-xl ring-1 ring-black/5">
    <div class="flex items-center justify-between mb-3">
      <h3 class="text-sm font-semibold text-neutral-900">Feedback</h3>
      <button type="button" data-feedback-close class="text-neutral-400 hover:text-neutral-600">&times;</button>
    </div>
    <div data-feedback-panel-root
         hx-get="/feedback/widget"
         hx-trigger="revealed"
         hx-swap="innerHTML">
      <p class="text-sm text-neutral-500">Loading…</p>
    </div>
  </div>
</div>
