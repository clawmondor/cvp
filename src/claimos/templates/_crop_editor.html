<div class="fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
  <div class="relative max-w-5xl w-full max-h-[90vh] overflow-auto bg-surface rounded-lg shadow-xl p-4">
    <div id="crop-editor-{{ evidence_file.id }}"
         data-init="crop-editor"
         data-ef-id="{{ evidence_file.id }}"
         data-img-w="{{ img_w }}"
         data-img-h="{{ img_h }}"
         data-img-src="/files/{{ stored_path }}">

      <div class="flex items-center justify-between mb-3">
        <h3 class="text-sm font-semibold text-neutral-900">Edit crops — {{ evidence_file.filename }}</h3>
        <button data-crop-editor-close="{{ evidence_file.id }}"
                class="text-xs text-neutral-400 hover:text-neutral-700">✕ Close</button>
      </div>

      <div class="flex gap-4">
        <!-- Canvas -->
        <div class="flex-shrink-0">
          <canvas id="ce-canvas-{{ evidence_file.id }}"
                  class="block rounded-sm border border-neutral-200 cursor-crosshair"
                  style="max-width:100%"></canvas>
        </div>

        <!-- Sidebar -->
        <div class="flex flex-col gap-2 min-w-[210px] w-56">
          <div id="ce-sidebar-{{ evidence_file.id }}">
            <p class="text-xs text-neutral-400">Click a box to select it.</p>
          </div>
          <div class="mt-auto pt-2 border-t border-neutral-100">
            <button id="ce-recrop-btn-{{ evidence_file.id }}"
                    disabled
                    class="w-full rounded-sm bg-primary px-3 py-1.5 text-sm font-semibold text-white hover:bg-primary-light disabled:opacity-40 disabled:cursor-not-allowed">
              Re-crop adjusted items (0)
            </button>
            <p id="ce-status-{{ evidence_file.id }}" class="mt-1 text-xs text-neutral-400"></p>
            <div class="mt-3 pt-2 border-t border-neutral-100">
              <button id="ce-draw-toggle-{{ evidence_file.id }}"
                      class="w-full rounded-sm border border-success-emphasis px-3 py-1.5 text-sm font-semibold text-success hover:bg-success-surface">
                Draw scan region
              </button>
              <button id="ce-scan-region-btn-{{ evidence_file.id }}"
                      disabled
                      class="mt-1 w-full rounded-sm bg-success-emphasis px-3 py-1.5 text-sm font-semibold text-white hover:bg-success disabled:opacity-40 disabled:cursor-not-allowed">
                Scan this region
              </button>
              <p id="ce-region-status-{{ evidence_file.id }}" class="mt-1 text-xs text-neutral-400"></p>
            </div>
          </div>
        </div>
      </div>

    </div>
    <script type="application/json" id="crop-data-{{ evidence_file.id }}">{{ crops_json | tojson }}</script>
  </div>
</div>
