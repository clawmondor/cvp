<li id="room-{{ room.id }}"
    class="group flex items-center justify-between rounded-md border border-neutral-200 bg-surface px-4 py-2.5 shadow-xs">
  <span id="room-name-{{ room.id }}" class="text-sm font-medium text-neutral-900">{{ room.name }}</span>
  <div class="flex items-center gap-2">
    <button
      data-rename-room-id="{{ room.id }}"
      class="hidden rounded-sm px-2 py-0.5 text-xs text-neutral-500 hover:bg-neutral-100 group-hover:inline-flex">
      Rename
    </button>
    <button
      hx-delete="/api/rooms/{{ room.id }}"
      hx-target="#room-{{ room.id }}"
      hx-swap="outerHTML"
      hx-confirm="Delete room '{{ room.name }}'? Items in this room will become unassigned."
      class="hidden rounded-sm px-2 py-0.5 text-xs text-error hover:bg-error-surface group-hover:inline-flex">
      Delete
    </button>
  </div>
</li>
